name: CI

on:
  push:
    branches: [master]
    paths: ['MacDown2/**', '.github/workflows/ci.yml']
  pull_request:
    branches: [master]
    paths: ['MacDown2/**', '.github/workflows/ci.yml']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # macos-15 arm64 images carry Xcode 26, so this is the documented fallback
    # until the macos-26 runner label is confirmed available everywhere.
    # See planning/epic-00-implementation.md Step 6.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: brew install swiftlint swiftformat
      - name: SwiftFormat (lint)
        run: swiftformat --lint MacDown2
      - name: SwiftLint (strict)
        run: swiftlint lint --strict MacDown2

  build-and-test:
    # macos-15 arm64 images carry Xcode 26, so this is the documented fallback
    # until the macos-26 runner label is confirmed available everywhere.
    # See planning/epic-00-implementation.md Step 6.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Select Xcode 26 FIRST so every subsequent step (swift build/test,
      # xcodegen, xcodebuild) uses the same Swift 6.2+ toolchain.
      - name: Select Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | grep "26" | head -1 || true)
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode*.app | head -1); fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Package build + tests
        working-directory: MacDown2/Packages/MacDownKit
        run: |
          swift build
          swift test
      - name: Generate Xcode project
        working-directory: MacDown2
        run: xcodegen generate
      - name: Build app + CLI
        run: |
          xcodebuild -project MacDown2/MacDown2.xcodeproj -scheme MacDown2 -destination 'platform=macOS' build
          xcodebuild -project MacDown2/MacDown2.xcodeproj -scheme macdown2 -destination 'platform=macOS' build
      - name: App + UI tests
        run: xcodebuild -project MacDown2/MacDown2.xcodeproj -scheme MacDown2 -destination 'platform=macOS' test
